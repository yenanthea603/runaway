<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超市殭屍生存戰 - 華語學習版</title>
    <style>
        :root { --main-gold: #FFD700; --danger-red: #FF4444; }
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; touch-action: none; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; max-width: 500px; margin: 0 auto; background: #222; overflow: hidden; border-left: 2px solid #444; border-right: 2px solid #444; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI 介面 */
        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .stats { display: flex; justify-content: space-between; padding: 15px; color: white; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        #questionBox { 
            background: rgba(0, 0, 0, 0.85); border: 2px solid var(--main-gold); border-radius: 15px;
            margin: 10px 20px; padding: 15px; text-align: center; color: var(--main-gold);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); transition: transform 0.3s;
        }
        .q-hint { font-size: 14px; color: #aaa; margin-bottom: 5px; }
        .q-main { font-size: 32px; font-weight: bold; display: block; }
        .q-sub { font-size: 18px; color: #00FF00; display: block; height: 20px; }

        /* 特效層 */
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: red; opacity: 0; pointer-events: none; }
        
        /* 覆蓋層 */
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; z-index: 100; }
        button { background: var(--danger-red); color: white; border: none; padding: 15px 40px; font-size: 20px; border-radius: 30px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="uiLayer">
        <div class="stats">
            <div id="lives">❤️❤️❤️❤️❤️</div>
            <div id="score">0</div>
        </div>
        <div id="questionBox" class="hidden">
            <span id="qHint" class="q-hint">請尋找對應的食材</span>
            <span id="qMain" class="q-main">---</span>
            <span id="qSub" class="q-sub">---</span>
        </div>
    </div>
    <div id="flash"></div>

    <div id="startScreen" class="overlay">
        <h1 style="font-size: 40px; color: var(--danger-red);">🧟 超市殭屍跑酷</h1>
        <p style="padding: 0 30px;">逃離巨大的殭屍！<br>依照指示收集正確的補給品生存下去。</p>
        <button onclick="startGame()">開始遊戲</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h1 style="color: var(--danger-red);">你被殭屍抓住了！</h1>
        <p id="finalScore">最終分數: 0</p>
        <button onclick="startGame()">重新挑戰</button>
    </div>
</div>

<script>
/** 遊戲資料設定 **/
const vocabList = [
    { hanzi: '蘋果', pinyin: 'píng guǒ', emoji: '🍎' },
    { hanzi: '牛奶', pinyin: 'niú nǎi', emoji: '🥛' },
    { hanzi: '麵包', pinyin: 'miàn bāo', emoji: '🍞' },
    { hanzi: '雞蛋', pinyin: 'jī dàn', emoji: '🥚' },
    { hanzi: '牛肉', pinyin: 'niú ròu', emoji: '🥩' },
    { hanzi: '青菜', pinyin: 'qīng cài', emoji: '🥬' },
    { hanzi: '西瓜', pinyin: 'xī guā', emoji: '🍉' },
    { hanzi: '起司', pinyin: 'qǐ sī', emoji: '🧀' },
    { hanzi: '鹽巴', pinyin: 'yán bā', emoji: '🧂' }
];

const praiseWords = ["太棒了！", "正確！", "很好！", "Perfect!", "加油！"];

/** 遊戲變數 **/
let canvas, ctx, width, height, laneWidth;
let gameState = 'start';
let score = 0, lives = 5, speed = 4;
let spawnTimer = 0;
let currentQ = null;
let gameMode = 0; // 0: 字/拼音->圖, 1: 拼音->圖, 2: 圖->字

let player = { lane: 1, y: 0, size: 50 };
let entities = [];
let particles = [];

function init() {
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    resize();
    window.addEventListener('resize', resize);
    setupControls();
    requestAnimationFrame(gameLoop);
}

function resize() {
    width = document.getElementById('gameContainer').clientWidth;
    height = document.getElementById('gameContainer').clientHeight;
    canvas.width = width; canvas.height = height;
    laneWidth = width / 3;
    player.y = height - 120;
    player.size = laneWidth * 0.5;
}

function setupControls() {
    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft') movePlayer(-1);
        if (e.key === 'ArrowRight') movePlayer(1);
    });
    let startX = 0;
    canvas.addEventListener('touchstart', e => startX = e.touches[0].clientX, {passive: true});
    canvas.addEventListener('touchend', e => {
        let diff = e.changedTouches[0].clientX - startX;
        if (Math.abs(diff) > 30) movePlayer(diff > 0 ? 1 : -1);
        else movePlayer(e.changedTouches[0].clientX < width/2 ? -1 : 1);
    }, {passive: true});
}

function movePlayer(dir) {
    player.lane = Math.max(0, Math.min(2, player.lane + dir));
}

function startGame() {
    score = 0; lives = 5; speed = 4; entities = []; particles = [];
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('questionBox').classList.remove('hidden');
    newQuestion();
    gameState = 'playing';
}

function newQuestion() {
    currentQ = vocabList[Math.floor(Math.random() * vocabList.length)];
    gameMode = Math.floor(Math.random() * 3); // 隨機切換三種模式
    
    const m = document.getElementById('qMain');
    const s = document.getElementById('qSub');
    const h = document.getElementById('qHint');

    if (gameMode === 0) {
        h.innerText = "請收集正確的食材 (看字)";
        m.innerText = currentQ.hanzi;
        s.innerText = score > 100 ? "" : currentQ.pinyin;
    } else if (gameMode === 1) {
        h.innerText = "聽音辨位 (根據拼音選擇)";
        m.innerText = currentQ.pinyin;
        s.innerText = "";
    } else {
        h.innerText = "識字挑戰 (看圖找正確漢字)";
        m.innerText = currentQ.emoji;
        s.innerText = "";
    }
}

/** 生成邏輯：間隔掉落，避免過於密集 **/
function spawnLogic() {
    spawnTimer += speed;
    if (spawnTimer > 350) { // 大幅拉開垂直間距 (原本約 180)
        spawnTimer = 0;
        let r = Math.random();

        if (r < 0.4) {
            // 生成單個殭屍 (更可怕)
            entities.push({ type: 'zombie', lane: Math.floor(Math.random()*3), y: -100, size: player.size * 1.6 });
        } else if (r < 0.8) {
            // 生成單個目標物或錯物
            spawnItem();
        } else {
            // 生成「二選一」排，留一條活路，避免三排塞滿造成壓力
            spawnRow();
        }
    }
}

function spawnItem() {
    let lane = Math.floor(Math.random() * 3);
    let isCorrect = Math.random() > 0.4;
    let item = isCorrect ? currentQ : vocabList[Math.floor(Math.random()*vocabList.length)];
    entities.push({
        type: 'food',
        data: item,
        isCorrect: item.hanzi === currentQ.hanzi,
        lane: lane,
        y: -60,
        size: player.size
    });
}

function spawnRow() {
    let lanes = [0, 1, 2].sort(() => Math.random() - 0.5);
    // 只放兩個，留一條全空的路
    entities.push({ type: 'food', data: currentQ, isCorrect: true, lane: lanes[0], y: -60, size: player.size });
    entities.push({ type: 'zombie', lane: lanes[1], y: -60, size: player.size * 1.6 });
}

function update() {
    if (gameState !== 'playing') return;
    speed = 4 + (score / 150); // 緩慢提速
    spawnLogic();

    for (let i = entities.length - 1; i >= 0; i--) {
        let e = entities[i];
        e.y += speed;

        // 碰撞偵測
        let px = player.lane * laneWidth + laneWidth/2;
        let ex = e.lane * laneWidth + laneWidth/2;
        if (Math.hypot(px - ex, player.y - e.y) < player.size * 0.8) {
            if (e.type === 'zombie' || (e.type === 'food' && !e.isCorrect)) {
                handleHit();
            } else {
                score += 10;
                particles.push({ x: px, y: player.y, text: praiseWords[Math.floor(Math.random()*praiseWords.length)], life: 40 });
                newQuestion();
            }
            entities.splice(i, 1);
            continue;
        }

        if (e.y > height + 100) entities.splice(i, 1);
    }

    particles.forEach((p, i) => { p.y -= 2; p.life--; if(p.life <= 0) particles.splice(i,1); });
    document.getElementById('score').innerText = score;
}

function handleHit() {
    lives--;
    document.getElementById('lives').innerText = '❤️'.repeat(lives) + '🖤'.repeat(5-lives);
    let f = document.getElementById('flash');
    f.style.opacity = 1;
    setTimeout(() => f.style.opacity = 0, 150);
    
    if (lives <= 0) {
        gameState = 'over';
        document.getElementById('gameOverScreen').classList.remove('hidden');
        document.getElementById('finalScore').innerText = `最終分數: ${score}`;
    }
}

function draw() {
    ctx.clearRect(0, 0, width, height);
    
    // 背景跑道
    ctx.fillStyle = '#222';
    ctx.fillRect(0,0,width,height);
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 2;
    for(let i=1; i<3; i++) {
        ctx.beginPath(); ctx.moveTo(i*laneWidth, 0); ctx.lineTo(i*laneWidth, height); ctx.stroke();
    }

    // 繪製物件
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    entities.forEach(e => {
        let ex = e.lane * laneWidth + laneWidth/2;
        if (e.type === 'zombie') {
            // 殭屍呼吸動畫
            let pulse = Math.sin(Date.now()/200) * 5;
            ctx.shadowBlur = 15; ctx.shadowColor = 'red';
            ctx.font = `${e.size + pulse}px serif`;
            ctx.fillText('🧟', ex, e.y);
            ctx.shadowBlur = 0;
        } else {
            // 根據模式顯示圖片或文字
            if (gameMode === 2) { // 模式 2 是看圖找字，所以掉落物是漢字
                ctx.fillStyle = '#FFF';
                ctx.font = `bold ${e.size * 0.5}px sans-serif`;
                ctx.fillText(e.data.hanzi, ex, e.y);
            } else { // 其他模式掉落物是圖片
                ctx.font = `${e.size}px serif`;
                ctx.fillText(e.data.emoji, ex, e.y);
            }
        }
    });

    // 繪製玩家
    ctx.font = `${player.size}px serif`;
    ctx.fillText('🏃', player.lane * laneWidth + laneWidth/2, player.y);

    // 讚揚文字
    particles.forEach(p => {
        ctx.fillStyle = '#00FF00';
        ctx.font = 'bold 25px sans-serif';
        ctx.fillText(p.text, p.x, p.y);
    });
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

init();
</script>
</body>
</html>

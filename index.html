<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超市跑酷：殭屍危機 2.0</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; touch-action: none; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; max-width: 600px; margin: 0 auto; background-color: #222; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; }
        .top-bar { display: flex; justify-content: space-between; padding: 15px; color: white; font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        #questionBox { text-align: center; background: rgba(0, 0, 0, 0.85); color: #FFD700; padding: 15px; border-radius: 0 0 20px 20px; border-bottom: 3px solid #FF4444; margin: 0 20px; transition: all 0.3s; }
        .pinyin { font-size: 18px; color: #00FF00; display: block; margin-top: 5px; }
        .mode-hint { font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; z-index: 10; }
        button { margin-top: 30px; padding: 15px 40px; font-size: 20px; background-color: #FF4444; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .hidden { display: none !important; }
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: red; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="uiLayer">
        <div class="top-bar">
            <div id="livesDisplay">❤️❤️❤️❤️❤️</div>
            <div id="scoreDisplay">分數: 0</div>
        </div>
        <div id="questionBox" class="hidden">
            <div class="mode-hint" id="qHint">請收集正確的食材</div>
            <span id="qMain" style="font-size: 32px;">準備中...</span>
            <span id="qPinyin" class="pinyin"></span>
        </div>
    </div>
    <div id="flash"></div>
    <div id="startScreen" class="overlay">
        <h1 style="color: #FF4444; font-size: 40px;">🧟 超市生存戰</h1>
        <p>閃避巨大的飢餓殭屍！</p>
        <p>根據上方提示，收集正確的食材或漢字。</p>
        <button id="startBtn">開始挑戰</button>
    </div>
    <div id="gameOverScreen" class="overlay hidden">
        <h1 style="color: #F44336;">你被吃掉了！</h1>
        <p id="finalScoreText">最終分數: 0</p>
        <button id="restartBtn">重新生存</button>
    </div>
</div>

<script>
/** 遊戲資料配置 **/
const vocabList = [
    { hanzi: '蘋果', pinyin: 'píng guǒ', emoji: '🍎' },
    { hanzi: '牛奶', pinyin: 'niú nǎi', emoji: '🥛' },
    { hanzi: '麵包', pinyin: 'miàn bāo', emoji: '🍞' },
    { hanzi: '雞蛋', pinyin: 'jī dàn', emoji: '🥚' },
    { hanzi: '牛肉', pinyin: 'niú ròu', emoji: '🥩' },
    { hanzi: '青菜', pinyin: 'qīng cài', emoji: '🥬' },
    { hanzi: '西瓜', pinyin: 'xī guā', emoji: '🍉' },
    { hanzi: '鹽巴', pinyin: 'yán bā', emoji: '🧂' }
];

let canvas, ctx, width, height, laneWidth;
let gameState = 'start';
let score = 0;
let lives = 5;
let currentSpeed = 5;
let spawnTimer = 0;
let currentQuestion = null;
let qMode = 0; // 0: 看字找圖, 1: 看拼音找圖, 2: 看圖找字

let player = { lane: 1, y: 0, size: 50 };
let entities = [];
let particles = [];

function init() {
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    resize();
    window.addEventListener('resize', resize);
    document.getElementById('startBtn').onclick = startGame;
    document.getElementById('restartBtn').onclick = startGame;
    setupInput();
    requestAnimationFrame(gameLoop);
}

function resize() {
    width = document.getElementById('gameContainer').clientWidth;
    height = document.getElementById('gameContainer').clientHeight;
    canvas.width = width; canvas.height = height;
    laneWidth = width / 3;
    player.y = height - 120;
}

function setupInput() {
    window.onkeydown = (e) => {
        if(e.key === 'ArrowLeft') move(-1);
        if(e.key === 'ArrowRight') move(1);
    };
    let startX = 0;
    canvas.ontouchstart = (e) => startX = e.touches[0].clientX;
    canvas.ontouchend = (e) => {
        let diff = e.changedTouches[0].clientX - startX;
        if(Math.abs(diff) > 30) move(diff > 0 ? 1 : -1);
        else move(e.changedTouches[0].clientX < width/2 ? -1 : 1);
    };
}

function move(dir) {
    player.lane = Math.max(0, Math.min(2, player.lane + dir));
}

function startGame() {
    score = 0; lives = 5; currentSpeed = 5;
    entities = []; particles = [];
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('questionBox').classList.remove('hidden');
    pickQuestion();
    gameState = 'playing';
}

function pickQuestion() {
    currentQuestion = vocabList[Math.floor(Math.random() * vocabList.length)];
    // 隨機切換題型
    qMode = Math.floor(Math.random() * 3);
    
    const qMain = document.getElementById('qMain');
    const qPinyin = document.getElementById('qPinyin');
    const qHint = document.getElementById('qHint');

    if (qMode === 0) { // 看字找圖
        qHint.innerText = "請收集正確的圖片食物";
        qMain.innerText = currentQuestion.hanzi;
        qPinyin.innerText = score > 100 ? "" : currentQuestion.pinyin; // 分數高於100隱藏拼音
    } else if (qMode === 1) { // 看拼音找圖
        qHint.innerText = "根據拼音找圖片";
        qMain.innerText = currentQuestion.pinyin;
        qPinyin.innerText = "";
    } else { // 看圖找字
        qHint.innerText = "這是什麼？請收集正確的漢字";
        qMain.innerText = currentQuestion.emoji;
        qPinyin.innerText = "";
    }
}

function spawn() {
    spawnTimer += currentSpeed;
    // 增加間距，原本是 180，現在提高到 250 以上讓畫面更乾淨
    if (spawnTimer > 250) {
        spawnTimer = 0;
        let r = Math.random();
        
        if (r < 0.4) { // 40% 殭屍 (變大，增加恐懼感)
            entities.push({ type:'zombie', lane: Math.floor(Math.random()*3), y: -100, size: player.size * 1.5 });
        } else if (r < 0.7) { // 30% 單一物件
            spawnSingleItem();
        } else { // 30% 選擇題排
            spawnRow();
        }
    }
}

function spawnSingleItem() {
    let isCorrect = Math.random() > 0.3;
    let item = isCorrect ? currentQuestion : vocabList[Math.floor(Math.random()*vocabList.length)];
    entities.push({
        type: 'food',
        item: item,
        isCorrect: item.hanzi === currentQuestion.hanzi,
        lane: Math.floor(Math.random()*3),
        y: -60,
        size: player.size
    });
}

function spawnRow() {
    let lanes = [0,1,2].sort(() => Math.random()-0.5);
    // 正確答案
    entities.push({ type:'food', item: currentQuestion, isCorrect: true, lane: lanes[0], y: -60, size: player.size });
    // 障礙物 (殭屍或錯字)
    entities.push({ type:'zombie', lane: lanes[1], y: -60, size: player.size * 1.5 });
}

function update() {
    if (gameState !== 'playing') return;
    currentSpeed = 5 + (score / 100);
    spawn();

    for (let i = entities.length - 1; i >= 0; i--) {
        let e = entities[i];
        e.y += currentSpeed;
        
        // 碰撞偵測
        let px = player.lane * laneWidth + laneWidth/2;
        let ex = e.lane * laneWidth + laneWidth/2;
        if (Math.hypot(px - ex, player.y - e.y) < player.size) {
            if (e.type === 'zombie') hit();
            else if (e.type === 'food') {
                if (e.isCorrect) {
                    score += 10;
                    particles.push({x: px, y: player.y, text: "太棒了！", life: 50});
                    pickQuestion();
                } else hit();
            }
            entities.splice(i, 1);
            continue;
        }
        if (e.y > height) entities.splice(i, 1);
    }

    for (let p of particles) { p.y -= 2; p.life--; }
    particles = particles.filter(p => p.life > 0);
    
    document.getElementById('scoreDisplay').innerText = `分數: ${score}`;
}

function hit() {
    lives--;
    document.getElementById('livesDisplay').innerText = '❤️'.repeat(lives) + '🖤'.repeat(5-lives);
    document.getElementById('flash').style.opacity = 1;
    setTimeout(() => document.getElementById('flash').style.opacity = 0, 100);
    if (lives <= 0) {
        gameState = 'over';
        document.getElementById('gameOverScreen').classList.remove('hidden');
        document.getElementById('finalScoreText').innerText = `最終分數: ${score}`;
    }
}

function draw() {
    ctx.clearRect(0, 0, width, height);
    
    // 背景與路徑
    ctx.fillStyle = '#333';
    ctx.fillRect(0,0,width,height);
    ctx.strokeStyle = '#555';
    ctx.setLineDash([20, 20]);
    for(let i=1; i<3; i++) {
        ctx.beginPath(); ctx.moveTo(i*laneWidth, 0); ctx.lineTo(i*laneWidth, height); ctx.stroke();
    }

    // 繪製物件
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let e of entities) {
        let ex = e.lane * laneWidth + laneWidth/2;
        if (e.type === 'zombie') {
            // 殭屍放大並有輕微晃動效果
            let scale = 1 + Math.sin(Date.now()/200) * 0.1;
            ctx.font = `${e.size * scale}px serif`;
            ctx.fillText('🧟', ex, e.y);
        } else {
            ctx.font = `${e.size}px serif`;
            // 根據模式決定掉落物顯示圖片還是文字
            if (qMode === 2) { // 題目是圖，掉落物就要是「漢字」
                ctx.fillStyle = "#FFF";
                ctx.font = `bold 24px sans-serif`;
                ctx.fillText(e.item.hanzi, ex, e.y);
            } else { // 其他模式掉落物是「圖片」
                ctx.fillText(e.item.emoji, ex, e.y);
            }
        }
    }

    // 玩家
    ctx.font = `${player.size}px serif`;
    ctx.fillText('🏃', player.lane * laneWidth + laneWidth/2, player.y);

    // 特效
    for (let p of particles) {
        ctx.fillStyle = '#00FF00';
        ctx.font = 'bold 30px sans-serif';
        ctx.fillText(p.text, p.x, p.y);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

init();
</script>
</body>
</html>
